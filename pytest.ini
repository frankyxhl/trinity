[pytest]
# Silence a benign pytest-bdd internal warning (it calls usefixtures() with
# no args for every scenario, which pytest then warns about). Removes ~10
# warnings per BDD test run from CI logs without hiding anything actionable.
filterwarnings =
    ignore:usefixtures\(\) in.*without arguments has no effect:pytest.PytestWarning
asyncio_mode = auto

markers =
    slow: marks tests as slow (deselect with `-m "not slow"`)
    integration: reads the live machine environment (real ~/.claude/trinity.json); deselect with `-m "not integration"`

# Default: skip slow tests (real-provider smoke, 30s+ timeouts) and integration
# tests (which read the runner's real home config and would fail nondeterministically
# on a machine with unrelated stale config). Explicit opt-in via `pytest -m slow`,
# `pytest -m integration`, or `pytest -m ""` (run all). Without this, `make test` /
# CI would run those suites on every push.
addopts = -m "not slow and not integration"

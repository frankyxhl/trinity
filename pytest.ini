[pytest]
# Silence a benign pytest-bdd internal warning (it calls usefixtures() with
# no args for every scenario, which pytest then warns about). Removes ~10
# warnings per BDD test run from CI logs without hiding anything actionable.
filterwarnings =
    ignore:usefixtures\(\) in.*without arguments has no effect:pytest.PytestWarning
asyncio_mode = auto

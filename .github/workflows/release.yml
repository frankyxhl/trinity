name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: |
          Optional. Leave empty to publish current main HEAD using its
          VERSION file (one-click path). Provide an existing tag (e.g.
          v1.7.0) to re-publish that tag (retry path; release must not
          already exist on the GitHub Releases page).
        required: false

permissions:
  contents: read

# At most one release flow at a time. Two simultaneous dispatches for the
# same tag would race at push; cancel-in-progress: false because we do not
# want to interrupt an already-running publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Read-only verification job. Holds NO write permission so any third-party
  # action loaded here (setup-uv, upload-artifact, etc.) cannot push tags or
  # mutate releases. Outputs feed the publish job.
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      one_click: ${{ steps.tag.outputs.one_click }}
    steps:
      - name: Verify dispatched from main (one-click path only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name == ''
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::One-click release must be triggered from main, got $GITHUB_REF"
            exit 1
          fi
          echo "Dispatched from main — one-click path"

      - name: Checkout (full history for ancestor check)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Resolve and validate tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ONE_CLICK=0
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            VERSION_FILE=$(tr -d '[:space:]' < VERSION)
            TAG="v$VERSION_FILE"
            ONE_CLICK=1
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::Bad tag format: $TAG (expected v<MAJOR>.<MINOR>.<PATCH>)"; exit 1; }

          VERSION_FILE=$(tr -d '[:space:]' < VERSION)
          [[ "$VERSION_FILE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::Malformed VERSION file: '$VERSION_FILE'"; exit 1; }
          [ "${TAG#v}" = "$VERSION_FILE" ] || {
            echo "::error::Tag $TAG does not match VERSION $VERSION_FILE"; exit 1; }

          if [ "$ONE_CLICK" = "1" ]; then
            if git ls-remote --tags origin "refs/tags/$TAG" 2>/dev/null | grep -q "refs/tags/$TAG$"; then
              echo "::error::Tag $TAG already exists on remote. Did you forget to bump VERSION? Use the retry path (provide tag_name input) to re-publish an existing tag."
              exit 1
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_FILE" >> "$GITHUB_OUTPUT"
          echo "one_click=$ONE_CLICK" >> "$GITHUB_OUTPUT"
          echo "Resolved tag $TAG matches VERSION $VERSION_FILE (one_click=$ONE_CLICK)"

      - name: Verify tag is on main
        if: steps.tag.outputs.one_click != '1'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git rev-parse "$TAG" >/dev/null || { echo "::error::Tag $TAG does not exist"; exit 1; }
          git fetch origin main --depth=0 2>/dev/null || git fetch origin main
          git merge-base --is-ancestor "$TAG" origin/main || {
            echo "::error::Tag $TAG is not an ancestor of origin/main"; exit 1; }
          echo "Tag $TAG is on main"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: 'Makefile'

      - name: Install dev dependencies (uv → pip fallback)
        run: |
          set -euo pipefail
          if command -v uv >/dev/null 2>&1; then
            uv venv
            uv pip install pytest ruff
          else
            python3 -m venv .venv
            .venv/bin/pip install pytest ruff
          fi

      - name: Verify build
        run: make verify-built

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG section [$VERSION] is missing or empty"; exit 1
          fi
          printf '%s\n' "$NOTES" > release-notes.md
          echo "Extracted $(wc -l < release-notes.md) lines from CHANGELOG"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-notes-${{ steps.tag.outputs.tag }}
          path: release-notes.md
          retention-days: 30

  # Write-permission job. Runs only after verify is fully green. No third-party
  # actions other than first-party `actions/checkout` and `actions/download-artifact`.
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Fail fast if the PAT is missing (one-click path only). Without it,
      # `git push origin <tag>` will hit the tag-protection ruleset and 403.
      # See TRN-2007 §D11 for the PAT-setup runbook.
      - name: Verify RELEASE_TAG_PAT secret (one-click path only)
        if: needs.verify.outputs.one_click == '1'
        env:
          PAT: ${{ secrets.RELEASE_TAG_PAT }}
        run: |
          set -euo pipefail
          if [ -z "$PAT" ]; then
            echo "::error::RELEASE_TAG_PAT secret is not configured. See TRN-2007 §D11 for the PAT-setup runbook (fine-grained PAT, contents:write, repo-scoped)."
            exit 1
          fi
          echo "RELEASE_TAG_PAT is set"

      # One-click checkout uses the PAT so the local git remote is wired with
      # an actor (PAT owner = admin) that satisfies the tag-protection ruleset.
      # All other paths skip this step (no tag-push needed).
      - name: Checkout main HEAD with PAT (one-click path only)
        if: needs.verify.outputs.one_click == '1'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: refs/heads/main
          token: ${{ secrets.RELEASE_TAG_PAT }}

      - name: Download release notes artifact
        uses: actions/download-artifact@v5
        with:
          name: release-notes-${{ needs.verify.outputs.tag }}

      - name: Create + push tag (one-click path only)
        if: needs.verify.outputs.one_click == '1'
        env:
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          # Race re-check: another workflow may have pushed the tag between
          # verify's pre-flight and now (concurrency: group: release should
          # serialize, but defense in depth).
          if git ls-remote --tags origin "refs/tags/$TAG" 2>/dev/null | grep -q "refs/tags/$TAG$"; then
            echo "::error::Tag $TAG appeared on remote after pre-flight (race with another workflow)"; exit 1
          fi
          git tag "$TAG"
          # Push uses the PAT-wired remote (configured by the previous checkout step),
          # so the actor is the PAT owner — satisfies tag-protection ruleset bypass.
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Designed exit: when Path A pushes a tag via RELEASE_TAG_PAT,
            # the PAT-driven push triggers this same workflow again via
            # `on.push.tags`. The duplicate run reaches here, finds the
            # release already published by the original Path A run, and
            # exits cleanly instead of failing — keeps the Actions tab
            # clear of "false-positive" red checks.
            if [ "$EVENT_NAME" = "push" ]; then
              echo "Release $TAG already exists. Tag-push trigger is the duplicate from a Path A run that already published. Skipping cleanly."
              exit 0
            fi
            echo "::error::Release $TAG already exists. Delete it manually if you intend to recreate."
            exit 1
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --notes-file release-notes.md
          echo "Published $TAG"

name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel an in-flight run on the same ref when a new commit lands. Keeps
# CI minutes from piling up on a fast-iterating PR (e.g. a COR-1612 review
# loop pushing fixes every few minutes).
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Detect test-relevant changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          changed_files="${RUNNER_TEMP}/changed-files.txt"
          zero_sha="0000000000000000000000000000000000000000"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            if ! git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
              echo "run_tests=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git diff --name-only HEAD^1 HEAD > "$changed_files"
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "$zero_sha" ]; then
              echo "run_tests=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" > "$changed_files"
          else
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_tests=false
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in
              rules/*) ;;
              */*) run_tests=true; break ;;
              *.md) ;;
              *) run_tests=true; break ;;
            esac
          done < "$changed_files"

          echo "run_tests=$run_tests" >> "$GITHUB_OUTPUT"
      - name: No test-relevant changes
        if: steps.changes.outputs.run_tests != 'true'
        run: echo "No test-relevant changes; expensive checks skipped."
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.changes.outputs.run_tests == 'true'
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup uv
        if: steps.changes.outputs.run_tests == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install dev dependencies
        if: steps.changes.outputs.run_tests == 'true'
        run: make setup
      - name: Lint
        if: steps.changes.outputs.run_tests == 'true'
        run: make lint
      - name: Run tests
        if: steps.changes.outputs.run_tests == 'true'
        run: make test
      - name: Run coverage
        if: steps.changes.outputs.run_tests == 'true'
        run: make coverage
      - name: Upload coverage report
        if: always() && steps.changes.outputs.run_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn
          retention-days: 14

  ubuntu-latest:
    name: ubuntu-latest
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi

  macos-latest:
    name: macos-latest
    needs: test
    runs-on: macos-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test matrix result: ${{ needs.test.result }}"
            exit 1
          fi
